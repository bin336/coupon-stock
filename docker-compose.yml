services:
  coupon-stock:
    build: .
    container_name: coupon-stock
    restart: unless-stopped
    # host 模式：容器直接使用 NAS 主机网络，Tailscale 虚拟网卡的 100.x.x.x 才能访问到服务
    # （若用 ports: 映射，只会绑定局域网网卡，手机经 Tailscale 访问会报 Forbidden）
    network_mode: host
    environment:
      - PORT=3000
      - DATA_DIR=/app/data
      - TZ=Asia/Shanghai
      # ↓↓↓ 首次启动前请务必修改以下三项 ↓↓↓
      - ADMIN_USER=admin
      - ADMIN_PASS=admin123
      - JWT_SECRET=change-me-please-use-a-long-random-string
    volumes:
      # 数据与上传的二维码截图持久化到宿主机 ./data（升级/换机只动容器，数据不动）
      - ./data:/app/data
